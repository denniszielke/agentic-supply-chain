name: agentic-supply-chain
metadata:
  template: agentic-supply-chain@0.0.1
services:
  shopping-chat:
    project: ./src/shopping_chat
    host: containerapp
    language: py
  promotion-ingestion:
    project: ./src/promotion_ingestion
    host: containerapp
    language: py
  shopping-agent:
    project: ./src/shopping_agent
    host: containerapp
    language: py
infra:
  provider: bicep
  path: ./infra
hooks:
  postprovision:
    shell: sh
    run: python scripts/deploy_assets.py
  postdeploy:
    - shell: sh
      run: cp .azure/$AZURE_ENV_NAME/.env ./
    - shell: sh
      run: python -m pip install -q -r scripts/requirements-hosted-agents.txt
    - shell: sh
      run: python scripts/deploy_agents.py
