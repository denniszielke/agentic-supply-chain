<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Supply Chain MCP App</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      .row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
      input, button { padding: 0.5rem; }
      pre { background: #f4f4f4; padding: 1rem; border-radius: 8px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>Supply Chain MCP App</h1>
    <p>Use MCP capabilities: product search, category recommendation, supplier inventory.</p>

    <div class="row">
      <input id="query" placeholder="Search by description" />
      <button onclick="search()">Search</button>
    </div>

    <div class="row">
      <input id="category" placeholder="Category (e.g. meat)" />
      <button onclick="recommend()">Recommend</button>
    </div>

    <div class="row">
      <input id="supplier" placeholder="Supplier ID" />
      <button onclick="inventory()">Inventory</button>
      <button onclick="suppliers()">List suppliers</button>
    </div>

    <pre id="output">Ready.</pre>

    <script>
      async function post(url, payload) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      }

      function search() {
        post('/mcp/search', { query: document.getElementById('query').value });
      }

      function recommend() {
        post('/mcp/recommend', { category_id: document.getElementById('category').value, limit: 5 });
      }

      function inventory() {
        post('/mcp/inventory', { supplier_id: document.getElementById('supplier').value });
      }

      async function suppliers() {
        const res = await fetch('/mcp/suppliers');
        const data = await res.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
